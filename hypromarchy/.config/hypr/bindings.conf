# =====================================================
# UNBINDS: keys we're remapping from Omarchy defaults
# =====================================================

# Navigation overrides (HJKL focus)
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L

# Workspace cycling (comma/period)
unbind = SUPER, COMMA
unbind = SUPER SHIFT, COMMA

# Displaced tiling defaults → relocated
unbind = SUPER, O
unbind = SUPER, P
unbind = SUPER, code:61
unbind = SUPER ALT, code:61

# Remove workspace TAB cycling (using comma/period instead)
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
unbind = SUPER CTRL, TAB

# App launcher overrides
unbind = SUPER, RETURN
unbind = SUPER ALT, RETURN

# Unbind SUPER+W (Close window → moving to Q) and SUPER+X (Universal cut → moving to W)
unbind = SUPER, W
unbind = SUPER, X

# Unbind unused webapp/app launcher keys
unbind = SUPER SHIFT, M
unbind = SUPER SHIFT ALT, M
unbind = SUPER SHIFT, N
unbind = SUPER SHIFT, D
unbind = SUPER SHIFT, G
unbind = SUPER SHIFT, O
unbind = SUPER SHIFT, W
unbind = SUPER SHIFT, SLASH
unbind = SUPER SHIFT, A
unbind = SUPER SHIFT ALT, A
unbind = SUPER SHIFT, C
unbind = SUPER SHIFT, E
unbind = SUPER SHIFT, Y
unbind = SUPER SHIFT ALT, G
unbind = SUPER SHIFT CTRL, G
unbind = SUPER SHIFT, P
unbind = SUPER SHIFT, X
unbind = SUPER SHIFT ALT, X

# Volume override: 2% steps instead of default
unbind = , XF86AudioRaiseVolume
unbind = , XF86AudioLowerVolume

# =====================================================
# VOLUME: 2% steps
# =====================================================
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, omarchy-swayosd-client --output-volume +2
bindeld = ,XF86AudioLowerVolume, Volume down, exec, omarchy-swayosd-client --output-volume -2

# =====================================================
# HJKL NAVIGATION (layout-aware)
# =====================================================
bindd = SUPER, H, Focus left, layoutmsg, focus l
bindd = SUPER, J, Focus down, layoutmsg, focus d
bindd = SUPER, K, Focus up, layoutmsg, focus u
bindd = SUPER, L, Focus right, layoutmsg, focus r
bindd = SUPER SHIFT, H, Swap left, swapwindow, l
bindd = SUPER SHIFT, J, Swap down, swapwindow, d
bindd = SUPER SHIFT, K, Swap up, swapwindow, u
bindd = SUPER SHIFT, L, Swap right, swapwindow, r

# =====================================================
# WORKSPACE CYCLING
# =====================================================
bind = SUPER, comma, workspace, e-1
bind = SUPER, period, workspace, e+1

# =====================================================
# DISPLACED DEFAULTS → NEW HOMES
# =====================================================
bindd = SUPER, SLASH, Toggle window split, layoutmsg, togglesplit
bindd = SUPER ALT, SLASH, Show key bindings, exec, omarchy-menu-keybindings
bindd = SUPER, BACKSLASH, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
bindd = SUPER SHIFT, I, Toggle scrolling/master layout, exec, ~/.config/hypr/omarchy-hyprland-workspace-layout-scrolling-master-toggle
bindd = SUPER SHIFT, O, Pop window out, exec, omarchy-hyprland-window-pop
bindd = SUPER SHIFT CTRL, SLASH, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
bindd = SUPER ALT, PERIOD, Dismiss last notification, exec, makoctl dismiss

# =====================================================
# COLUMN RESIZE
# =====================================================
bindd = SUPER, R, Expand window left, layoutmsg, colresize +conf
bindd = SUPER SHIFT, R, Shrink window left, layoutmsg, colresize -conf
bindd = SUPER, Q, Close window, killactive
bindd = SUPER, W, Universal cut, sendshortcut, CTRL, X,

# =====================================================
# APP LAUNCHERS (personal overrides)
# =====================================================
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- wezterm start --always-new-process --cwd="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- ghostty -e bash -c "tmux attach -t helper || tmux new -s helper"
bindd = SUPER, E, Yazi, exec, ghostty -e yazi

# =====================================================
# MASTER LAYOUT
# =====================================================
bind = SUPER, semicolon, layoutmsg, swapwithmaster auto
bind = SUPER, Y, layoutmsg, cyclenext loop
bind = SUPER SHIFT, Y, layoutmsg, cycleprev loop
bind = SUPER, m, layoutmsg, promote
bind = SUPER, N, layoutmsg, rollnext
bind = SUPER, P, layoutmsg, rollprev
bind = SUPER, a, layoutmsg, addmaster
bind = SUPER, z, layoutmsg, removemaster
bind = SUPER, u, layoutmsg, mfact exact 0.70
bind = SUPER, i, layoutmsg, mfact exact 0.66
bind = SUPER, O, layoutmsg, mfact exact 0.5

# =====================================================
# SCROLLING LAYOUT
# =====================================================
bind = SUPER SHIFT, n, movewindow, l
bind = SUPER SHIFT, p, movewindow, r
bind = SUPER SHIFT, m, layoutmsg, promote
bind = SUPER SHIFT, COMMA, layoutmsg, swapcol l
bind = SUPER SHIFT, period, layoutmsg, swapcol r